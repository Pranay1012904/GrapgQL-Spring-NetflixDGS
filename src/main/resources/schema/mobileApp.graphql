type MobileApp{
    appId:ID!
    name:String!
    version:String!
    platform:[String]
    author:Author
    releaseDate:Date
    downloaded:NonNegativeInt
    homepage:Url
}

input MobileAppFilter{
    name:String
    version:String
    platform:String
    author:AuthorFilter
}

input AuthorFilter{
    name:String
}